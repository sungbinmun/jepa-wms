defaults:
  - _self_
  - override hydra/hydra_logging: disabled
  - override hydra/job_logging: disabled

hydra:
  output_subdir: null

wandb:
  enable: true
  project: ocjepa
  entity: null
  name: metaworld_mv_acjepa

use_hungarian_matching: true
hungarian_cost_type: mse

dataset_name: metaworld_slot_multiview
embedding_dir_gripper: /path/to/metaworld_gripper_slots.pkl
embedding_dir_third: /path/to/metaworld_third_slots.pkl
cache_dir: "~/.stable_worldmodel"
action_dir: /path/to/metaworld_actions.pkl
proprio_dir: /path/to/metaworld_proprio.pkl
state_dir: /path/to/metaworld_states.pkl

output_model_name: metaworld_cjepa_agent_centric_multiview_slotcontrast
resume_from_existing_ckpt: false

trainer:
  max_epochs: 30
  devices: 1
  accelerator: gpu
  strategy: auto
  precision: 16-mixed
  log_every_n_steps: 1

batch_size: 128
num_workers: 8
seed: 42
console_log_every_n_steps: 20
console_log_single_line: true

n_steps: ${eval:'${dinowm.num_preds} + ${dinowm.history_size}'}
frameskip: 5

dinowm:
  history_size: 3
  num_preds: 1
  proprio_dim: 4
  proprio_embed_dim: 20
  action_dim: 4
  action_embed_dim: 10

num_masked_slots: 2

predictor_lr: 5e-4
action_encoder_lr: 5e-4
proprio_head_lr: 5e-4

videosaur:
  NUM_SLOTS: 7
  SLOT_DIM: 64
  DINO_MODEL: vit_base_patch16_dinov3
  FEAT_DIM: 768
  NUM_PATCHES: 1024
  NUM_GPUS: 1
  BATCH_SIZE_PER_GPU: 32
  TOTAL_BATCH_SIZE: "${mul: ${.NUM_GPUS}, ${.BATCH_SIZE_PER_GPU}}"
  BASE_LR: 0.0001

multiview:
  num_views: 2
  view_names: [gripper, third]
  use_view_pe: true
  use_slot_pe: true

agent_centric:
  action_embed_dim: 64
  heads: 8
  mlp_dim: 256
  dropout: 0.1
  stop_gradient_agent_to_object: true
  masked_history_loss_weight: 1.0
  proprio_loss_weight: 1.0
  object_loss_weight: 1.0
  agent_loss_weight: 1.0

# Placeholder OC config kept for checkpoint object compatibility.
model:
  load_weights: null
  modules_to_load: null
  input_type: video
  visualize: false
  visualize_every_n_steps: 10000
  target_encoder: null
  target_encoder_input: null
  mask_resizers: null
  masks_to_visualize: null

  losses:
    loss_featrec:
      name: MSELoss
      pred_dims:
        - 0
        - ${videosaur.FEAT_DIM}
  loss_weights:
    loss_featrec: 1.0

  initializer:
    name: RandomInit
    n_slots: ${videosaur.NUM_SLOTS}
    dim: ${videosaur.SLOT_DIM}

  encoder:
    backbone:
      name: TimmExtractor
      model: ${videosaur.DINO_MODEL}
      features:
      - vit_block12
      frozen: true
      pretrained: true
    output_transform:
      name: networks.two_layer_mlp
      inp_dim: ${videosaur.FEAT_DIM}
      outp_dim: ${videosaur.SLOT_DIM}
      hidden_dim: "${mul: ${videosaur.FEAT_DIM}, 2}"
      layer_norm: true

  grouper:
    name: SlotAttention
    inp_dim: ${videosaur.SLOT_DIM}
    slot_dim: ${videosaur.SLOT_DIM}
    n_iters: 2
    use_mlp: true

  latent_processor:
    first_step_corrector_args:
      n_iters: 3

  decoder:
    name: SlotMixerDecoder
    inp_dim: ${videosaur.SLOT_DIM}
    embed_dim: ${videosaur.SLOT_DIM}
    outp_dim: ${videosaur.FEAT_DIM}
    n_patches: ${videosaur.NUM_PATCHES}
    allocator:
      name: TransformerEncoder
      dim: ${videosaur.SLOT_DIM}
      memory_dim: ${videosaur.SLOT_DIM}
      n_blocks: 2
      n_heads: 4
    renderer:
      name: MLP
      inp_dim: ${videosaur.SLOT_DIM}
      outp_dim: 1024
      hidden_dims: [1024, 1024]
      final_activation: true
    renderer_dim: 1024
    use_layer_norms: true
    pos_embed_mode: add

  predictor:
    name: networks.TransformerEncoder
    dim: ${videosaur.SLOT_DIM}
    n_blocks: 1
    n_heads: 4

dummy_optimizer:
  name: Adam
  lr: "${eval_dummy: 'a / 32 * b', ${videosaur.TOTAL_BATCH_SIZE}, ${videosaur.BASE_LR}}"
  lr_scheduler:
    name: exp_decay_with_warmup
    warmup_steps: 2000
    decay_steps: ${dummy_trainer.max_steps}

dummy_trainer:
  accelerator: gpu
  max_steps: 100000
  log_every_n_steps: 1
  val_check_interval: 1000
  gradient_clip_val: 0.05
