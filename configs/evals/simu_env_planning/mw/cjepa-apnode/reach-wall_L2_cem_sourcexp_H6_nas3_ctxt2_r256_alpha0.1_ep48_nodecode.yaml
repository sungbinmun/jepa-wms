nodes: 2
tasks_per_node: 8
cpus_per_task: 16
mem_per_gpu: 210G
copy_code: false
folder: ${JEPAWM_LOGS}/mw_compare/cjepa_apnode
checkpoint_folder: ${JEPAWM_LOGS}/mw_compare/cjepa_apnode
tag:
  online_gc_zeroshot/reach-wall_L2_cem_sourcexp_H6_nas3_ctxt2_r224_alpha0.1_ep48_nodecode/cjepa-apnode
eval_name: simu_env_planning
meta:
  quick_debug: false
  seed: 1
  eval_episodes: 48
distributed:
  distribute_multitask_eval: true
  local_rng_samplers: true
  seed_shift: horizon_1000
logging:
  exp_name: gc_zeroshot_dist
  save_csv: true
  tqdm_silent: false
  optional_plots: true
model_kwargs:
  module_name: app.vjepa_wm.modelcustom.simu_env_planning.cjepa_slot_enc_preds
  checkpoint: ${CJEPA_APNODE_OBJECT_CKPT}
  pretrain_kwargs:
    tubelet_size_enc: 1
    slotcontrast_checkpoint: ${SLOTCONTRAST_CKPT}
    slotcontrast_config: ${SLOTCONTRAST_CFG}
  data:
    dataset_type: custom
    datasets:
    - METAWORLD_HF
    datasets_weights:
    seed: 234
    img_size: 224
    validation:
      val_datasets: []
      val_datasets_1:
      num_frames_val: 18
      val_dataset_batch_size: 4
      val_dataset_drop_last: false
      val_dataset_fpcs:
      - 8
      val_dataset_camera_views:
      - exterior_image_2_left
      val_viz_rank0_loader: false
    loader:
      batch_size: 8
      num_workers: 16
      pin_mem: true
      persistent_workers: true
    custom:
      split_ratio: 0.9
      frameskip: 5
      action_skip: 1
      state_skip: 1
      normalize_action: true
      traj_subset: true
      filter_first_episodes:
      filter_tasks:
      num_hist: 3
      num_pred: 1
      with_reward: false
      custom_teleop_dset:
    droid:
      camera_frame: false
      camera_views:
      - 2
      droid_to_rcasa_action_format: 1
      rcasa_to_droid_action_format: false
      fps: 4
      dataset_fpcs:
      - 8
      mpk_manifest_patterns: []
  data_aug:
    auto_augment: false
    random_horizontal_flip: false
    motion_shift: false
    random_resize_aspect_ratio:
    - 1.0
    - 1.0
    random_resize_scale:
    - 1.777
    - 1.777
    reprob: 0.0
    normalize:
    - - 0.485
      - 0.456
      - 0.406
    - - 0.229
      - 0.224
      - 0.225
  wrapper_kwargs:
    ctxt_window: 2
task_specification:
  task: mw-reach-wall
  obs: rgb_state
  obs_concat_channels: false
  goal_source: expert
  succ_def: simu
  done_at_succ: false
  max_episode_steps: 100
  goal_H: 6
  num_frames: 1
  num_proprios: 1
  img_size: 224
  env:
    with_target: true
    with_velocity: true
    freeze_rand_vec: false
planner:
  planner_name: cem
  iterations: 15
  num_samples: 300
  num_elites: 10
  horizon: 6
  var_scale: 1.0
  num_act_stepped: 3
  repeat_actskip: false
  decode_each_iteration: false
  distribute_planner: false
  planning_objective:
    objective_type: L2
    sum_all_diffs: false
    alpha: 0.1
